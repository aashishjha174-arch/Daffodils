<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Daffodils Public School | Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="images/logo.webp">
<style>
:root{
  --glass: rgba(255,255,255,0.1);
  --gold:#d4af37;
  --text:#fff;
  --nav-color:#c2f3f3;
  --danger:#ff4444;
  --success: #4caf50;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  width:100%;
  -webkit-text-size-adjust: 100%;
}
#bg-container{
  position:fixed;
  inset:0;
  z-index:-2;
  background:#000;
}
.bg-slide{
  position:absolute;
  inset:-20px;
  background-size:cover;
  background-position:center;
  opacity:0;
  filter:blur(20px) brightness(0.4) saturate(1.2);
  transition:opacity 2s;
}
.bg-slide.active{opacity:1}
#particles{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none
}
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:.4;
  animation:floatUp 15s infinite linear
}
@keyframes floatUp{
  0%{transform:translateY(110vh);opacity:0}
  50%{opacity:.5}
  100%{transform:translateY(-10vh);opacity:0}
}

/* Header */
header{
  text-align:center;
  padding:clamp(30px, 6vw, 60px) clamp(10px, 3vw, 20px) clamp(10px, 3vw, 20px);
}

.title-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(10px, 3vw, 20px);
  flex-wrap:wrap;
}

.school-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.8rem, 6vw, 3.5rem);
  color:var(--gold);
  line-height: 1.2;
  word-break: break-word;
}

.school-logo{
  height:clamp(50px, 10vw, 80px);
  width: auto;
  border-radius:50%;
  filter:drop-shadow(0 0 10px rgba(212,175,55,.5));
}

header p {
  letter-spacing:clamp(2px, 1vw, 5px);
  opacity:.8;
  font-size:clamp(0.6rem, 2vw, 1rem);
  margin-top: 10px;
  word-break: break-word;
}

/* Navigation */
.nav-bar{
  display:flex;
  justify-content:center;
  gap:clamp(8px, 2vw, 20px);
  flex-wrap:wrap;
  padding:clamp(8px, 2vw, 10px) clamp(10px, 3vw, 20px);
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:999;
  width:100%;
}

.nav-bar a{
  color:var(--nav-color);
  text-decoration:none;
  font-weight:bold;
  padding:clamp(5px, 1.5vw, 8px) clamp(8px, 2vw, 15px);
  border-radius:20px;
  border:1px solid var(--nav-color);
  transition:.3s;
  font-size:clamp(0.7rem, 2vw, 1rem);
  white-space: nowrap;
}

.nav-bar a:hover{
  background:var(--nav-color);
  color:#000;
}

/* Main Content */
main{
  max-width:1200px;
  margin:clamp(20px, 5vw, 40px) auto;
  padding:clamp(10px, 3vw, 20px);
  text-align:center;
  width:100%;
}

h2{
  color:var(--gold);
  font-family:'Playfair Display',serif;
  margin-bottom:15px;
  font-size:clamp(1.3rem, 4vw, 2rem);
  word-break: break-word;
}

/* Review Form */
.review-form{
  max-width:600px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
}

.review-form textarea{
  padding:clamp(10px, 3vw, 12px) clamp(12px, 3vw, 15px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.6);
  color:white;
  outline:none;
  font-family:inherit;
  font-size:clamp(0.85rem, 2.5vw, 1rem);
  width:100%;
  resize: vertical;
}

.review-form button{
  background:var(--gold);
  border:none;
  padding:clamp(10px, 3vw, 12px);
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  font-size:clamp(0.85rem, 2.5vw, 1rem);
  transition: 0.3s;
  width:100%;
}

.review-form button:hover{
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(212,175,55,0.3);
}

/* Reviews Grid */
#reviews{
  margin-top:40px;
  display:grid;
  gap:20px;
  text-align:left;
  grid-template-columns: 1fr;
}

/* Review Card */
.review-card{
  background:var(--glass);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:clamp(15px, 4vw, 20px);
  position:relative;
  backdrop-filter:blur(10px);
  word-wrap: break-word;
  overflow-wrap: break-word;
  width:100%;
}

.review-card h3{
  color:var(--gold);
  margin-bottom:5px;
  font-size:clamp(1rem, 3vw, 1.2rem);
  padding-right: 80px;
  word-break: break-word;
}

.review-time{
  font-size:clamp(0.65rem, 2vw, 0.8rem);
  opacity:.7;
  margin-bottom:10px;
  word-break: break-word;
}

.review-card p{
  font-size:clamp(0.85rem, 2.5vw, 1rem);
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}

/* Action Buttons */
.delete-review, .report-review{
  position:absolute;
  top:clamp(10px, 3vw, 15px);
  cursor:pointer;
  font-size:clamp(0.8rem, 2.5vw, 1rem);
  opacity:.7;
  padding: 5px 8px;
  border-radius: 5px;
  transition: 0.3s;
}

.delete-review{
  right:clamp(15px, 4vw, 20px);
  color:var(--danger);
}

.report-review{
  right:clamp(70px, 15vw, 80px);
  color:#ff6666;
}

.delete-review:hover, .report-review:hover{
  opacity:1;
  transform: scale(1.05);
}

/* Replies Section */
.replies{
  margin-top:15px;
  padding-left:clamp(10px, 3vw, 20px);
  border-left:1px solid rgba(255,255,255,.2);
}

.reply-card{
  margin-bottom:10px;
  word-break: break-word;
}

.reply-card h4{
  color:var(--gold);
  font-size:clamp(0.75rem, 2.5vw, 0.9rem);
  margin-bottom:3px;
  word-break: break-word;
}

.reply-card p{
  margin:0;
  font-size:clamp(0.75rem, 2.5vw, 0.9rem);
  word-break: break-word;
}

/* Reply Form */
.reply-form{
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
  width:100%;
}

.reply-form textarea{
  flex:1;
  min-width:200px;
  border-radius:15px;
  padding:clamp(6px, 2vw, 8px) clamp(8px, 2.5vw, 12px);
  font-size:clamp(0.75rem, 2.5vw, 0.9rem);
  background:rgba(0,0,0,.6);
  color:white;
  border:1px solid rgba(255,255,255,.2);
  outline:none;
  font-family:inherit;
  resize: vertical;
}

.reply-form button{
  padding:clamp(6px, 2vw, 8px) clamp(12px, 3vw, 15px);
  border-radius:15px;
  background:var(--gold);
  border:none;
  color:#000;
  cursor:pointer;
  font-weight:bold;
  font-size:clamp(0.75rem, 2.5vw, 0.9rem);
  transition: 0.3s;
  white-space: nowrap;
}

.reply-form button:hover{
  transform: translateY(-2px);
  box-shadow: 0 3px 10px rgba(212,175,55,0.3);
}

/* Tab Buttons */
#tab-buttons{
  display:flex;
  justify-content:center;
  gap:clamp(10px, 3vw, 20px);
  margin-bottom:20px;
  flex-wrap:wrap;
}

#tab-buttons button{
  padding:clamp(8px, 2.5vw, 10px) clamp(15px, 4vw, 20px);
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  border-radius:20px;
  transition:.3s;
  font-size:clamp(0.8rem, 2.5vw, 1rem);
  border: 1px solid transparent;
}

#tab-buttons button.active{
  background:var(--gold);
  color:#000;
  border-color: var(--gold);
}

#tab-buttons button:hover{
  border-color: var(--gold);
}

/* Messages */
.success-message{
  color: var(--success);
  text-align:center;
  margin-top:10px;
  font-size:clamp(0.85rem, 2.5vw, 1rem);
  padding: 10px;
}

.report-message{
  color: #ffaa00;
  text-align: center;
  margin-top: 5px;
  font-size: clamp(0.75rem, 2.5vw, 0.9rem);
  background: rgba(0,0,0,0.5);
  padding: 8px 15px;
  border-radius: 20px;
  display: inline-block;
  max-width: 90%;
  word-break: break-word;
}

/* Modal Styles */
.custom-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.8);
  z-index: 10000;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-content {
  background: rgba(30, 30, 40, 0.98);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: clamp(20px, 5vw, 30px);
  max-width: 450px;
  width: 100%;
  position: relative;
  color: #fff;
  box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
  animation: modalPop 0.3s ease-out;
}

@keyframes modalPop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 32px;
  cursor: pointer;
  color: var(--gold);
  transition: 0.3s;
  line-height: 1;
}

.modal-close:hover {
  transform: scale(1.2);
  color: #ffaa00;
}

.modal-icon {
  font-size: 48px;
  color: var(--gold);
  margin-bottom: 15px;
  text-align: center;
}

.modal-title {
  color: var(--gold);
  font-size: clamp(20px, 5vw, 24px);
  margin-bottom: 15px;
  text-align: center;
  font-family: 'Playfair Display', serif;
}

.modal-body {
  margin-bottom: 20px;
  text-align: center;
  line-height: 1.6;
  font-size: clamp(14px, 4vw, 16px);
  word-break: break-word;
}

.modal-footer {
  display: flex;
  justify-content: center;
  gap: clamp(10px, 3vw, 15px);
  flex-wrap: wrap;
}

.modal-btn {
  padding: clamp(8px, 2.5vw, 10px) clamp(20px, 5vw, 30px);
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
  border: none;
  transition: 0.3s;
  font-size: clamp(14px, 4vw, 16px);
  min-width: 120px;
}

.modal-btn-primary {
  background: var(--gold);
  color: #000;
}

.modal-btn-primary:hover {
  background: #c9a22b;
  transform: scale(1.05);
}

.modal-btn-secondary {
  background: transparent;
  color: #fff;
  border: 1px solid var(--gold);
}

.modal-btn-secondary:hover {
  background: rgba(212, 175, 55, 0.2);
  transform: scale(1.05);
}

/* Warning Modal */
.warning-modal-content {
  background: rgba(30, 30, 50, 0.98);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: clamp(20px, 5vw, 40px);
  max-width: 520px;
  width: 90%;
  text-align: center;
  color: #fff;
  font-family: 'Playfair Display', serif;
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
  position: relative;
}

.warning-close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 28px;
  cursor: pointer;
  color: var(--gold);
}

.warning-title {
  color: var(--gold);
  margin-bottom: 25px;
  font-size: clamp(1.3rem, 4vw, 1.8rem);
}

.warning-text {
  line-height: 1.8;
  font-size: clamp(0.9rem, 3vw, 1.15rem);
  white-space: pre-wrap;
  margin-bottom: 30px;
}

.warning-btn {
  margin-top: 20px;
  background: var(--gold);
  color: #000;
  border: none;
  padding: clamp(10px, 3vw, 12px) clamp(25px, 6vw, 35px);
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  transition: 0.3s;
}

.warning-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
}

/* Responsive Breakpoints */
@media (max-width: 768px) {
  .review-card h3 {
    padding-right: 70px;
  }
  
  .delete-review, .report-review {
    font-size: 0.8rem;
    padding: 4px 6px;
  }
  
  .report-review {
    right: 60px;
  }
  
  .reply-form {
    flex-direction: column;
  }
  
  .reply-form textarea {
    width: 100%;
  }
  
  .reply-form button {
    width: 100%;
  }
  
  .modal-btn {
    min-width: 100px;
    padding: 8px 15px;
  }
}

@media (max-width: 480px) {
  .title-container {
    flex-direction: column;
    gap: 10px;
  }
  
  .school-name {
    text-align: center;
    font-size: 1.6rem;
  }
  
  header p {
    font-size: 0.65rem;
    letter-spacing: 2px;
  }
  
  .nav-bar {
    gap: 5px;
  }
  
  .nav-bar a {
    padding: 5px 8px;
    font-size: 0.7rem;
  }
  
  .review-card {
    padding: 12px;
  }
  
  .review-card h3 {
    font-size: 1rem;
    padding-right: 60px;
  }
  
  .report-review {
    right: 50px;
    font-size: 0.7rem;
  }
  
  .delete-review {
    font-size: 0.7rem;
  }
  
  .modal-content {
    padding: 20px 15px;
  }
  
  .modal-footer {
    flex-direction: column;
    gap: 10px;
  }
  
  .modal-btn {
    width: 100%;
  }
}

@media (max-width: 360px) {
  .school-name {
    font-size: 1.4rem;
  }
  
  .nav-bar a {
    padding: 4px 6px;
    font-size: 0.65rem;
  }
  
  .review-card h3 {
    font-size: 0.9rem;
  }
  
  .review-card p {
    font-size: 0.8rem;
  }
  
  .report-review {
    right: 45px;
  }
}

.event-title{color:var(--gold); font-family:'Playfair Display',serif; font-size:2rem; margin-bottom:20px;}
.grid-container{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;}
.memory-card{position:relative; cursor:pointer; border-radius:15px; overflow:hidden; border:1px solid rgba(255,255,255,0.1);}
.memory-card img, .memory-card video{width:100%; border-radius:15px;}
.memory-caption{text-align:center; margin-top:5px; font-size:1rem; opacity:0.8;}

/* --- Modal for enlarge --- */
#modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); display:none; justify-content:center; align-items:center; z-index:10000; opacity:0; transition:opacity 0.5s;}
#modal-overlay.active{display:flex; opacity:1;}
.modal-content{position:relative; max-width:90%; max-height:90%; display:flex; flex-direction:column; align-items:center;}
.modal-content img, .modal-content video{width:100%; max-height:80vh; border-radius:15px;}
.close-btn{position:absolute; top:-15px; right:-15px; font-size:3rem; color:white; cursor:pointer;}


</style>
</head>
<body>

<div id="bg-container"></div>
<div id="particles"></div>

<!-- Report Confirmation Modal -->
<div id="reportConfirmModal" class="custom-modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal('reportConfirmModal')">&times;</span>
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">Confirm Report</div>
    <div class="modal-body" id="reportModalBody">
      Are you sure you want to report this review?
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-secondary" onclick="closeModal('reportConfirmModal')">Cancel</button>
      <button class="modal-btn modal-btn-primary" id="confirmReportBtn">Report</button>
    </div>
  </div>
</div>

<!-- Warning Modal (will be created dynamically) -->
<!-- Will be created by JavaScript -->

<header>
  <div class="title-container">
    <h1 class="school-name">DAFFODILS PUBLIC SCHOOL</h1>
    <img src="images/logo.webp" class="school-logo">
  </div>
  <p>THE FINAL FAREWELL • BATCH 2082</p>
</header>

<div class="nav-bar">
  <a href="student.html">Batch Members</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="review.html">Review</a>
  <a href="ourmemories.html">Our Memories</a>
  <a href="backbone.html">Backbones</a>
</div>

<main>
  <h2>Reviews</h2>

  <div id="tab-buttons">
    <button id="tab-create" class="active">Create Review</button>
    <button id="tab-all">All Reviews</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="farewell.mp3" type="audio/mpeg">
  </audio>

  <div id="tab-content">
    <div id="create-review">
      <form class="review-form" id="reviewForm">
        <textarea id="reviewTextarea" placeholder="Write your review..." rows="5" required></textarea>
        <button type="submit">Submit Review</button>
      </form>
      <div id="successMsg" class="success-message"></div>
    </div>

    <div id="all-reviews" style="display:none;">
      <div id="reviews"></div>
    </div>
  </div>
</main>

<script>
const API_URL = "https://daffodils-1.onrender.com/reviews";
const REPORT_URL = "https://daffodils-1.onrender.com/report-review";

const token = localStorage.getItem('token');
const currentUser = localStorage.getItem('currentUser') || "Guest";

const form = document.getElementById("reviewForm");
const reviewTextarea = document.getElementById("reviewTextarea");
const box = document.getElementById("reviews");
const tabCreate = document.getElementById("tab-create");
const tabAll = document.getElementById("tab-all");
const createDiv = document.getElementById("create-review");
const allDiv = document.getElementById("all-reviews");
const successMsg = document.getElementById("successMsg");

// Store current report data
let currentReport = {
  reviewId: null,
  reviewText: null,
  uploaderName: null
};

// Modal functions
function showModal(modalId) {
  document.getElementById(modalId).style.display = 'flex';
}

function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
  // Clear current report data when closing
  if (modalId === 'reportConfirmModal') {
    currentReport = { reviewId: null, reviewText: null, uploaderName: null };
  }
}

// Close modal when clicking outside
window.onclick = function(event) {
  if (event.target.classList.contains('custom-modal')) {
    event.target.style.display = 'none';
    if (event.target.id === 'reportConfirmModal') {
      currentReport = { reviewId: null, reviewText: null, uploaderName: null };
    }
  }
}

// Background slideshow
const bgImages = ['images/bg.webp','images/bg2.webp','images/bg3.webp', 'images/sample2.webp'];
function setupBackgrounds(){
    const container = document.getElementById('bg-container');
    container.innerHTML='';
    bgImages.forEach((img,index)=>{
        const div=document.createElement('div');
        div.className=`bg-slide ${index===0?'active':''}`;
        div.style.backgroundImage=`url('${img}')`;
        container.appendChild(div);
    });
    let current=0;
    setInterval(()=>{
        const slides=document.querySelectorAll('.bg-slide');
        slides[current].classList.remove('active');
        current=(current+1)%slides.length;
        slides[current].classList.add('active');
    },6000);
}
setupBackgrounds();

// Particles
function createParticles(){
    const container=document.getElementById('particles');
    for(let i=0;i<40;i++){
        const p=document.createElement('div');
        p.className='particle';
        const size=Math.random()*4+2;
        p.style.width=`${size}px`;
        p.style.height=`${size}px`;
        p.style.left=Math.random()*100+'vw';
        p.style.animationDuration=(Math.random()*10+8)+'s';
        p.style.animationDelay=(Math.random()*5)+'s';
        container.appendChild(p);
    }
}
createParticles();

// Function to show temporary message
function showTemporaryMessage(element, message, duration = 3000) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'report-message';
  msgDiv.textContent = message;
  msgDiv.style.position = 'fixed';
  msgDiv.style.top = '20px';
  msgDiv.style.left = '50%';
  msgDiv.style.transform = 'translateX(-50%)';
  msgDiv.style.zIndex = '10000';
  msgDiv.style.backgroundColor = 'rgba(212, 175, 55, 0.9)';
  msgDiv.style.color = '#000';
  msgDiv.style.padding = '12px 24px';
  msgDiv.style.borderRadius = '30px';
  msgDiv.style.fontWeight = 'bold';
  msgDiv.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
  document.body.appendChild(msgDiv);
  
  setTimeout(() => {
    msgDiv.remove();
  }, duration);
}

// Submit Review
form.addEventListener("submit", async e => {
  e.preventDefault();
  const message = reviewTextarea.value.trim();
  if(!message) return alert("Please write something");

  if (!token) {
    alert("Please log in first to post a review.");
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    if (!data.success) {
      if (res.status === 401) {
        alert("Session expired or unauthorized. Please log in again.");
      } else if (data.message === "blocked_toxic") {
        // Show gold warning modal with clear text functionality
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:10000; display:flex; justify-content:center; align-items:center;';
        modal.innerHTML = `
          <div class="warning-modal-content">
            <span class="warning-close-btn" onclick="this.closest('.warning-modal-content').parentElement.remove(); document.getElementById('reviewTextarea').value = '';">&times;</span>
            <h2 class="warning-title">Review Not Posted</h2>
            <p class="warning-text">${data.warning}</p>
            <button class="warning-btn" onclick="this.closest('.warning-modal-content').parentElement.remove(); document.getElementById('reviewTextarea').value = '';">
              Close
            </button>
          </div>
        `;
        document.body.appendChild(modal);
      } else {
        alert(data.message || "Failed to submit review");
      }
      return;
    }

    successMsg.textContent = "Review submitted successfully!";
    reviewTextarea.value = ""; // Clear textarea on success
    loadReviews();
    setTimeout(() => successMsg.textContent = "", 3000);

  } catch (err) {
    console.error("Submit error:", err);
    alert("Network error – check if server is running");
  }
});

// Load Reviews
async function loadReviews() {
  try {
    const res = await fetch(API_URL);
    const reviews = await res.json();
    box.innerHTML = reviews.map(r => {
      r.replies = r.replies || [];
      return `
      <div class="review-card" data-id="${r._id}">
        <h3>${r.name}</h3>
        <div class="review-time">${new Date(r.createdAt).toLocaleString()}</div>
        <p>${r.message}</p>
        ${r.name === currentUser 
          ? '<span class="delete-review">Delete</span>' 
          : '<span class="report-review" style="color:#ff6666; cursor:pointer;">Report</span>'}
        <div class="replies">
          ${r.replies.map(rep=>`
            <div class="reply-card">
              <h4>${rep.name}</h4>
              <p>${rep.message}</p>
            </div>`).join('')}
        </div>
        <form class="reply-form">
          <textarea placeholder="Write a reply..." rows="1" required></textarea>
          <button type="submit">Reply</button>
        </form>
      </div>`;
    }).join("");
  } catch(err){ console.error(err); }
}

// Submit Reply
document.addEventListener('submit', async e => {
  if(!e.target.classList.contains('reply-form')) return;
  e.preventDefault();
  const textarea = e.target.querySelector('textarea');
  const replyText = textarea.value.trim();
  if(!replyText) return;

  const reviewCard = e.target.closest('.review-card');
  const reviewId = reviewCard.dataset.id;

  try {
    const res = await fetch(`${API_URL}/${reviewId}/reply`, {
      method:"POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": `Bearer ${token}`
      },
      body:JSON.stringify({name: currentUser, message: replyText})
    });
    const data = await res.json();
    if(data.success) loadReviews();
    textarea.value = "";
  } catch(err){ console.error(err); }
});

// Delete Review
document.addEventListener('click', async e => {
  if(!e.target.classList.contains('delete-review')) return;
  const reviewCard = e.target.closest('.review-card');
  const reviewId = reviewCard.dataset.id;
  try {
    await fetch(`${API_URL}/${reviewId}`, {
      method:"DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    loadReviews();
  } catch(err){ console.error(err); }
});

// Report Review - Show confirmation modal first
document.addEventListener('click', e => {
  if (!e.target.classList.contains('report-review')) return;

  const reviewCard = e.target.closest('.review-card');
  const reviewId = reviewCard.dataset.id;
  const reviewText = reviewCard.querySelector('p').textContent.trim();
  const uploaderName = reviewCard.querySelector('h3').textContent.trim();

  if (!token) {
    alert("Please log in to report a review.");
    return;
  }

  // Store report data
  currentReport = {
    reviewId,
    reviewText,
    uploaderName
  };

  // Update modal body with review info
  document.getElementById('reportModalBody').innerHTML = `
    Are you sure you want to report this review?<br><br>
    <strong>By: ${uploaderName}</strong><br>
    <em>"${reviewText.substring(0, 100)}${reviewText.length > 100 ? '...' : ''}"</em>
  `;

  // Show confirmation modal
  showModal('reportConfirmModal');
});

// Handle confirmed report
document.getElementById('confirmReportBtn').addEventListener('click', async () => {
  if (!currentReport.reviewId) return;

  try {
    const res = await fetch(REPORT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ reviewId: currentReport.reviewId })
    });

    const data = await res.json();

    // Close confirmation modal
    closeModal('reportConfirmModal');

    if (data.success) {
      showTemporaryMessage(null, "✓ Report sent! Will be reviewed by admin soon.", 4000);
    } else {
      if (data.message === "You already reported this review") {
        showTemporaryMessage(null, "You already reported this review", 3000);
      } else {
        alert(data.message || "Failed to send report");
      }
    }
  } catch (err) {
    console.error("Report error:", err);
    closeModal('reportConfirmModal');
    alert("Network error – try again");
  }
});

// Tabs
tabCreate.onclick = ()=> {
  createDiv.style.display = "block";
  allDiv.style.display = "none";
  tabCreate.classList.add("active");
  tabAll.classList.remove("active");
};
tabAll.onclick = ()=> {
  createDiv.style.display = "none";
  allDiv.style.display = "block";
  tabAll.classList.add("active");
  tabCreate.classList.remove("active");
  loadReviews();
};

// Music functionality
const music = document.getElementById("bgMusic");

if (sessionStorage.getItem("musicUnlocked") === "true") {
    music.volume = 0.6;
    music.play().catch(()=>{});
}

function unlockMusic() {
    if (!music.paused) return;

    music.volume = 0.6;
    music.play().then(() => {
        sessionStorage.setItem("musicUnlocked", "true");
        document.removeEventListener("click", unlockMusic);
        document.removeEventListener("touchstart", unlockMusic);
    }).catch(()=>{});
}

document.addEventListener("click", unlockMusic);
document.addEventListener("touchstart", unlockMusic);

// Initial load
loadReviews();
</script>

</body>
</html>
